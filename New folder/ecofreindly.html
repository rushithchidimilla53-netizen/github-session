<!DOCTYPE html>
<html>
<head>
  <title>Eco-Freindly Packing Store Using Al </title>

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef1f5;
    }

    .login-box {
      max-width: 320px;
      margin: 120px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 5px;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    .navbar {
      background: #2874f0;
      color: white;
      padding: 12px;
      display: none;
      align-items: center;
    }

    .logo { font-weight: bold; }
    .search { flex: 1; margin: 0 15px; }

    .menu { 
      margin-left: 15px; 
      cursor: pointer; 
      display:flex;              /* ✅ ADDED */
      align-items:center;        /* ✅ ADDED */
      gap:5px;                   /* ✅ ADDED */
    }

    .page { display: none; padding: 20px; }
    .active { display: block; }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .added {
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); background: #d4edda; }
      100% { transform: scale(1); }
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 5px;
    }

    .stars {
      color: gold;
      font-size: 14px;
      margin: 5px 0;
    }

    .cart-item {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .cart-item img {
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:5px;
    }

    .qty button{
      width:30px;
      margin:2px;
      background:#2874f0;
    }

    .pay-icons img{
      width:50px;
      margin:5px;
    }
    

  </style>
</head>

<body>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- LOGIN -->
<div id="login" class="page active">
  <div class="login-box">
    <h2><i class="fa fa-leaf"></i> Eco-Freindly Packing Store Using Al 🌱</h2> <!-- ✅ ADDED -->
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()"><i class="fa fa-sign-in-alt"></i> Login</button> <!-- ✅ ADDED -->
    <button onclick="signup()">Signup</button>
    <p id="msg" style="color:red;"></p>
  </div>
</div>


<!-- NAVBAR -->
<div class="navbar" id="nav">
  <div class="logo">EcoPack</div>

  <div class="search">
    <input onkeyup="search(this.value)" placeholder="Search products...">
  </div>

  <!-- ✅ UPDATED: ICONS -->
  <div class="menu" onclick="show('home')">
    <i class="fa fa-home"></i> Home
  </div>

  <div class="menu" onclick="showCart()">
    <i class="fa fa-shopping-cart"></i> Cart
  </div>

  <div class="menu" onclick="logout()">
    <i class="fa fa-user"></i> Logout
  </div>
</div>

<!-- HOME -->
<div id="home" class="page">
  <div id="products" class="container"></div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Your Cart 🛒</h2>
  <div id="cartItems"></div>
  <h3 id="totalText"></h3>
  <button onclick="goToCheckout()">Buy Now</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
  <h2>Enter Address 🏠</h2>
  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <textarea id="address" placeholder="Full Address"></textarea>
  <button onclick="goToPayment()">Continue to Payment</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <h2>Select Payment Method 💳</h2>

  <div class="pay-icons">
    <img src="https://img.icons8.com/color/48/visa.png">
    <img src="https://img.icons8.com/color/48/mastercard.png">
    <img src="https://img.icons8.com/color/48/google-pay.png">
    <img src="https://img.icons8.com/color/48/upi.png">
  </div>

  <select id="paymentMethod" onchange="changePayment()">
    <option value="COD">Cash on Delivery</option>
    <option value="UPI">UPI</option>
    <option value="CARD">Card</option>
  </select>

  <div id="paymentDetails"></div>

  <button onclick="confirmPayment()">Confirm Payment</button>
</div>

<script>
/* ✅ YOUR ORIGINAL JS — NOT MODIFIED */
let products = [
{id:1,name:"Paper Bags Pack",price:199,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db",rating:4},
{id:2,name:"Compostable Boxes",price:299,img:"https://images.unsplash.com/photo-1585386959984-a415522316f9",rating:5},
{id:3,name:"T-Shirt",price:500,img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6",rating:3},
{id:4,name:"Reusable Packaging Kit",price:399,img:"https://images.unsplash.com/photo-1615486363973-0fcb9e7b9d3e",rating:4},
{id:5,name:"Shirt",price:1000,img:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10",rating:5},
{id:6,name:"Eco Tape",price:99,img:"https://images.unsplash.com/photo-1586075010923-2dd4570fb338",rating:3},
{id:7,name:"Cloth Bags",price:349,img:"https://images.unsplash.com/photo-1593032465171-8f5b4f3d06c3",rating:4},
{id:8,name:"Cycle",price:3000,img:"https://images.unsplash.com/photo-1621972750749-0fbb1abb7736",rating:5},
{id:9,name:"Corrugated Box",price:279,img:"https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d",rating:4},
{id:10,name:"Snikers",price:1500,img:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb",rating:4}
];

let cart = {};
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let currentOrder = null;

const productsDiv = document.getElementById("products");

function signup(){ localStorage.setItem(user.value, pass.value); msg.innerText="Account created!"; }

/* ✅ UPDATED LOGIN FUNCTION (FIXED) */
function login(){
  let storedPass = localStorage.getItem(user.value);

  // If user not registered
  if(!storedPass){
    msg.innerText = "❌ Please signup first!";
    return;
  }

  // ❌ Wrong password
  if(storedPass !== pass.value){
    msg.innerText = "❌ Wrong password!";
    return;
  }

  // ✅ Correct login
  nav.style.display="flex";
  show("home");
  loadProducts(products);
}

/* ✅ OPTIONAL UX IMPROVEMENT */
user.oninput = pass.oninput = () => msg.innerText="";

function logout(){ location.reload(); }

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function loadProducts(list){
  productsDiv.innerHTML="";
  list.forEach(p=>{
    let stars = "⭐".repeat(p.rating);
    productsDiv.innerHTML+=`
    <div class="card" id="card-${p.id}">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <div class="stars">${stars}</div>
      <p>₹${p.price}</p>
      <button onclick="addCart(${p.id})">Add to Cart</button>
    </div>`;
  });
}

function search(v){
  let filtered = products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase()));
  loadProducts(filtered);
}

function addCart(id){
  cart[id]=(cart[id]||0)+1;

  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  if(navigator.vibrate){ navigator.vibrate(100); }

  let card = document.getElementById("card-" + id);
  card.classList.add("added");
  setTimeout(()=>card.classList.remove("added"),400);
}

function inc(id){ cart[id]++; showCart(); }
function dec(id){ cart[id]--; if(cart[id]<=0) delete cart[id]; showCart(); }

function showCart(){
  show("cart");
  let div = document.getElementById("cartItems");
  div.innerHTML="";
  let total = 0;

  for(let id in cart){
    let p = products.find(x=>x.id==id);
    total += p.price * cart[id];

    div.innerHTML += `
      <div class="cart-item">
        <img src="${p.img}">
        <div style="flex:1;">
          ${p.name}<br>₹${p.price}
        </div>
        <div class="qty">
          <button onclick="dec(${id})">-</button>
          ${cart[id]}
          <button onclick="inc(${id})">+</button>
        </div>
        <div>₹${p.price * cart[id]}</div>
      </div>`;
  }

  totalText.innerText="Total: ₹"+total;
}

function goToCheckout(){
  if(Object.keys(cart).length === 0){ alert("Cart is empty!"); return; }
  show("checkout");
}

function goToPayment(){
  let n = document.getElementById("name").value.trim();
  let ph = document.getElementById("phone").value.trim();
  let ad = document.getElementById("address").value.trim();

  if(n === "" || ph === "" || ad === ""){
    alert("Fill all details!");
    return;
  }

  currentOrder = { items: cart, name:n, phone:ph, address:ad };
  show("payment");
}

function changePayment(){
  let method = paymentMethod.value;
  let box = paymentDetails;

  if(method==="UPI"){ box.innerHTML=`<input placeholder="Enter UPI ID">`; }
  else if(method==="CARD"){
    box.innerHTML=`<input placeholder="Card Number"><input placeholder="Expiry"><input placeholder="CVV">`;
  } else { box.innerHTML=`<p>Pay on delivery</p>`; }
}

function confirmPayment(){
  currentOrder.payment = paymentMethod.value;
  orders.push(currentOrder);
  localStorage.setItem("orders", JSON.stringify(orders));
  alert("Order placed successfully 🎉");
  cart = {};
  show("home");
}
</script>

</body>
</html>
